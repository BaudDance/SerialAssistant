    <script>
      ;(() => {
        try {
          const mode = localStorage.getItem('vueuse-color-scheme') || 'auto'
          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches
          document.documentElement.classList.toggle('dark', mode === 'dark' || (mode === 'auto' && prefersDark))
        } catch (_) {}
      })()
    </script>

    <style>
      :root {
        color-scheme: light;
        --app-fallback-background: #ffffff;
        --app-fallback-foreground: #171717;
        --app-fallback-muted: #737373;
        --app-fallback-border: rgb(0 0 0 / 10%);
        --app-fallback-spinner-track: rgb(0 0 0 / 12%);
      }

      .dark {
        color-scheme: dark;
        --app-fallback-background: #111827;
        --app-fallback-foreground: #f8fafc;
        --app-fallback-muted: #cbd5e1;
        --app-fallback-border: rgb(255 255 255 / 12%);
        --app-fallback-spinner-track: rgb(203 213 225 / 28%);
      }

      .app-fallback {
        min-height: 100svh;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: var(--foreground, var(--app-fallback-foreground));
        background: var(--background, var(--app-fallback-background));
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
      }

      .app-fallback__panel {
        width: min(100%, 320px);
        text-align: center;
      }

      .app-fallback__brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }

      .app-fallback__brand img {
        width: 48px;
        height: 48px;
      }

      .app-fallback__eyebrow {
        display: none;
      }

      .app-fallback h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .app-fallback p {
        margin: 8px 0 0;
        color: var(--muted-foreground, var(--app-fallback-muted));
        font-size: 14px;
        line-height: 1.6;
      }

      .app-fallback__status {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        margin-top: 18px;
      }

      .app-fallback__spinner {
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
        border: 2px solid var(--border, var(--app-fallback-spinner-track));
        border-top-color: var(--foreground, var(--app-fallback-foreground));
        border-radius: 999px;
        animation: app-fallback-spin 0.8s linear infinite;
      }

      @keyframes app-fallback-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
